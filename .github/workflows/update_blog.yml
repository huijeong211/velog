name: Update Blog Posts
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update_blog:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install feedparser gitpython

    - name: Run script
      run: python update_blog.py  # <--- 여기서 파일 이름을 못 찾아서 에러난 거야!

    - name: Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Update blog posts" || exit 0
        git push https://${{ secrets.GH_PAT }}@github.com/huijeong211/velog.git
